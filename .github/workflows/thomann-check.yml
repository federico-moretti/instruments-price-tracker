name: Daily Thomann Price Check

on:
  schedule:
    - cron: '15 12 * * *'
      timezone: Europe/Rome
  workflow_dispatch:

concurrency:
  group: thomann-price-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Scraper
        env:
          WISHLISTS: ${{ vars.WISHLISTS }}
          NOTIFY_PROVIDER: ${{ vars.NOTIFY_PROVIDER }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run check

      - name: Commit price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/history.jsonl
          git diff --staged --quiet || git commit -m "chore: update price history"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
